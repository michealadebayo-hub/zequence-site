  <rect x="58" y="58" width="1084" height="514" rx="34" fill="#FFFFFF" fill-opacity="0.72" stroke="#FFFFFF" stroke-opacity="0.75" stroke-width="2"/>

  <g>
    <rect x="96" y="105" width="132" height="132" rx="30" fill="#201A17"/>
    <rect x="103" y="112" width="118" height="118" rx="24" stroke="url(#accent)" stroke-width="3"/>
    <path d="M129 140H193V153L154 190H193V203H129V190L168 153H129V140Z" fill="#FFF8EF"/>
    <path d="M125 132C134 120 149 114 161 114C176 114 189 120 198 132" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
