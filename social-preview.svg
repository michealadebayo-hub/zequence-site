<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Zequence Digital social preview</title>
  <desc id="desc">A branded social preview card for Zequence Digital UK.</desc>

  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1120" y2="590" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8EF"/>
      <stop offset="0.58" stop-color="#FFF3E3"/>
      <stop offset="1" stop-color="#F3E7D4"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="120" x2="940" y2="520" gradientUnits="userSpaceOnUse">
